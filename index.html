<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מפת קריית מוצקין</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="mapWrap" aria-label="מפה">
        <div id="map"></div>
        <div class="loading loading--on" id="loading" aria-hidden="true"></div>
        <div class="brushViz brushViz--off" id="brushViz" aria-hidden="true">
          <div class="brushViz__inner"></div>
          <div class="brushViz__outer"></div>
        </div>

        <div class="captureFrame" id="captureFrame" aria-hidden="true">
          <div class="captureFrame__label" id="captureLabel"></div>
        </div>

        <div class="toolbar" aria-label="כפתורים">
          <button class="iconBtn" id="btnPanel" type="button" aria-label="פתיחה/סגירה של פאנל" title="פאנל">
            <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6.5h16M4 12h16M4 17.5h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="iconBtn" id="btnDownloadMenu" type="button" aria-label="הורדה" title="הורדה">
            <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v10m0 0 4-4m-4 4-4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5 17v3h14v-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <div class="downloadMenu downloadMenu--closed" id="downloadMenu" aria-label="אפשרויות הורדה">
          <button class="downloadMenu__item" id="btnExportPng" type="button" aria-label="PNG" title="PNG">PNG</button>
          <button class="downloadMenu__item" id="btnRecord10s" type="button" aria-label="וידאו 10 שניות" title="Video 10s">VIDEO 10s</button>
        </div>

        <aside class="panel panel--closed" id="panel" aria-label="פאנל שליטה">
          <div class="panel__row">
            <button class="panel__close" id="btnClosePanel" type="button" aria-label="סגירה" title="סגירה">
              <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>

          <div class="panel__section">
            <div class="panel__actions" aria-label="פעולות">
              <button class="actionBtn" id="btnResetLayout" type="button" aria-label="איפוס" title="איפוס">
                <img class="icoImg" src="./assets/icons/back-to-start.jpg" alt="" aria-hidden="true" />
              </button>
              <button class="actionBtn actionBtn--active" id="btnToolPan" type="button" aria-label="כלי הזזת מפה" title="Pan">
                <svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M6 3l12 9-7 2-2 7-3-18z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>

            <div class="panel__actions panel__actions--row2" aria-label="אקראיות">
              <button class="actionBtn" id="btnRandomize" type="button" aria-label="אקראי" title="Randomize">
                <img class="icoImg" src="./assets/icons/random.jpg" alt="" aria-hidden="true" />
              </button>
              <div class="randomCtl" aria-label="עוצמת אקראיות">
                <input id="rngRandomize" class="rngMini" type="range" min="0" max="100" step="1" value="35" aria-label="עוצמת אקראיות" />
              </div>
            </div>

            <div class="panel__actions panel__actions--row2" aria-label="כלי הזזה">
              <button class="actionBtn" id="btnToolMove" type="button" aria-label="כלי הזזת אלמנטים" title="Move">
                <img class="icoImg" src="./assets/icons/hand.webp" alt="" aria-hidden="true" />
              </button>
              <div class="radiusCtl" aria-label="רדיוס תפיסה">
                <input id="rngPickRadius" class="rngMini" type="range" min="10" max="260" step="1" value="40" aria-label="גודל רדיוס תפיסה" />
              </div>
            </div>
          </div>

          <div class="panel__section">
            <div class="panel__toggles">
              <label class="toggle" title="מבנים">
                <input id="chkBuildings" type="checkbox" checked />
                <span class="toggle__pill" aria-hidden="true"></span>
                <span class="toggle__icon" aria-hidden="true">
                  <svg class="ico" viewBox="0 0 24 24">
                    <path d="M6 6h12v12H6V6z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M9 9h2v2H9V9zm4 0h2v2h-2V9zM9 13h2v2H9v-2zm4 0h2v2h-2v-2z" fill="currentColor"/>
                  </svg>
                </span>
              </label>

              <label class="toggle" title="כבישים">
                <input id="chkRoads" type="checkbox" checked />
                <span class="toggle__pill" aria-hidden="true"></span>
                <span class="toggle__icon" aria-hidden="true">
                  <svg class="ico" viewBox="0 0 24 24">
                    <path d="M4 12h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </span>
              </label>

              <label class="toggle" title="שבילים">
                <input id="chkPaths" type="checkbox" checked />
                <span class="toggle__pill" aria-hidden="true"></span>
                <span class="toggle__icon" aria-hidden="true">
                  <svg class="ico" viewBox="0 0 24 24">
                    <path d="M4 12h3m2 0h3m2 0h3m2 0h3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </span>
              </label>

              <label class="toggle" title="ירוק">
                <input id="chkGreen" type="checkbox" checked />
                <span class="toggle__pill" aria-hidden="true"></span>
                <span class="toggle__icon" aria-hidden="true">
                  <svg class="ico" viewBox="0 0 24 24">
                    <path d="M7 7h10v10H7V7z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  </svg>
                </span>
              </label>
            </div>
          </div>

          <div class="panel__section">
            <div class="palette" aria-label="פלטות צבע">
              <button class="swatch" id="palNoir" type="button" aria-label="Noir" title="Noir"></button>
              <button class="swatch" id="palMidnight" type="button" aria-label="Midnight Blue" title="Midnight Blue"></button>
              <button class="swatch" id="palCoral" type="button" aria-label="Coral" title="Coral"></button>
              <button class="swatch" id="palSage" type="button" aria-label="Sage" title="Sage"></button>
              <button class="swatch" id="palHeatwave" type="button" aria-label="Heatwave" title="Heatwave"></button>
            </div>
          </div>

          <div class="panel__section">
            <div class="slider">
              <div class="slider__label" aria-hidden="true">
                <svg class="ico ico--xs" viewBox="0 0 24 24">
                  <path d="M4 12h16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </div>
              <input id="rngRoadWidth" type="range" min="1" max="8" step="1" value="3" aria-label="עובי כבישים" />
            </div>
            <div class="slider">
              <div class="slider__label" aria-hidden="true">
                <svg class="ico ico--xs" viewBox="0 0 24 24">
                  <path d="M12 3a9 9 0 1 0 0 18V3z" fill="currentColor"/>
                  <path d="M12 3a9 9 0 1 1 0 18" fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>
              </div>
              <input id="rngOpacity" type="range" min="0.05" max="0.9" step="0.05" value="0.5" aria-label="שקיפות שכבות" />
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
